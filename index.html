<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>積算温度トラッカー（村田町）</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
    .header { background: #3B6D11; color: #EAF3DE; padding: 1rem 1.25rem; }
    .header h1 { font-size: 17px; font-weight: 500; }
    .header p { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .container { max-width: 680px; margin: 0 auto; padding: 1rem; }
    .card-box { background: #fff; border-radius: 10px; border: 0.5px solid #e0e0d8; padding: 12px 14px; margin-bottom: 1rem; }
    .setting-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; font-size: 13px; color: #666; }
    .setting-bar input[type=date], .setting-bar input[type=number] { border: 0.5px solid #ccc; border-radius: 7px; padding: 5px 8px; font-size: 13px; background: #fafafa; color: #1a1a1a; }
    .setting-bar input[type=number] { width: 72px; }
    .fetch-btn { background: #3B6D11; color: #EAF3DE; border: none; border-radius: 7px; padding: 7px 16px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .fetch-btn:hover { background: #27500A; }
    .fetch-btn:disabled { background: #ccc; color: #888; cursor: not-allowed; }
    .status-msg { font-size: 13px; color: #666; margin-bottom: 0.75rem; min-height: 18px; }
    .status-msg.err { color: #c0392b; }
    .progress-header { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 8px; }
    .bar-bg { background: #eee; border-radius: 99px; height: 16px; overflow: hidden; }
    .bar-fill { height: 16px; border-radius: 99px; background: #639922; transition: width 0.4s ease; }
    .bar-fill.done { background: #1D9E75; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1rem; }
    .card { background: #fff; border-radius: 10px; border: 0.5px solid #e0e0d8; padding: 12px 14px; }
    .card-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .card-value { font-size: 22px; font-weight: 500; color: #1a1a1a; }
    .card-unit { font-size: 11px; color: #888; font-weight: 400; }
    .alert { border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 500; margin-bottom: 1rem; display: none; }
    .alert.near { background: #FAEEDA; color: #633806; display: block; }
    .alert.done { background: #E1F5EE; color: #085041; display: block; }
    .chart-card { background: #fff; border-radius: 10px; border: 0.5px solid #e0e0d8; padding: 14px; margin-bottom: 1rem; position: relative; height: 240px; }
    .empty { color: #aaa; font-size: 14px; text-align: center; padding: 2rem; background: #fff; border-radius: 10px; border: 0.5px solid #e0e0d8; margin-bottom: 1rem; }
    .table-card { background: #fff; border-radius: 10px; border: 0.5px solid #e0e0d8; overflow-x: auto; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    th { text-align: left; color: #888; font-weight: 400; font-size: 12px; padding: 8px 10px; border-bottom: 0.5px solid #eee; }
    td { padding: 7px 10px; border-bottom: 0.5px solid #f0f0ec; color: #1a1a1a; white-space: nowrap; }
    .note { font-size: 11px; color: #aaa; line-height: 1.7; padding-bottom: 2rem; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #e8e8e0; }
      .header { background: #27500A; }
      .card-box, .card, .chart-card, .table-card, .empty { background: #2a2a28; border-color: #3a3a38; }
      .setting-bar input[type=date], .setting-bar input[type=number] { background: #333; border-color: #555; color: #e8e8e0; }
      .bar-bg { background: #3a3a38; }
      th { color: #aaa; border-color: #3a3a38; }
      td { border-color: #333; color: #e8e8e0; }
      .card-label, .card-unit { color: #aaa; }
      .card-value { color: #e8e8e0; }
      .progress-header, .status-msg { color: #aaa; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>積算温度トラッカー</h1>
  <p>宮城県村田町 × Open-Meteo気象データ（過去90日分対応）</p>
</div>

<div class="container">

  <div class="card-box">
    <div class="setting-bar">
      <span>播種日</span>
      <input type="date" id="sow-date" />
      <span>目標</span>
      <input type="number" id="target-input" value="1800" step="50" min="100" />
      <span>℃日　基準</span>
      <input type="number" id="base-input" value="10" step="0.5" min="0" max="25" style="width:58px;" />
      <span>℃</span>
      <button class="fetch-btn" id="fetch-btn" onclick="fetchAll()">気温を自動取得</button>
    </div>
  </div>

  <div class="status-msg" id="status-msg">播種日を入力して「気温を自動取得」を押してください。</div>

  <div class="card-box">
    <div class="progress-header">
      <span id="prog-label">進捗 0 / 1800 ℃日</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
  </div>

  <div class="cards">
    <div class="card"><div class="card-label">積算温度</div><div class="card-value" id="c-total">0 <span class="card-unit">℃日</span></div></div>
    <div class="card"><div class="card-label">残り</div><div class="card-value" id="c-remain">— <span class="card-unit">℃日</span></div></div>
    <div class="card"><div class="card-label">取得日数</div><div class="card-value" id="c-days">0 <span class="card-unit">日</span></div></div>
    <div class="card"><div class="card-label">最新データ</div><div class="card-value" id="c-latest" style="font-size:13px;padding-top:6px;">—</div></div>
  </div>

  <div class="alert" id="alert-box"></div>

  <div class="chart-card">
    <canvas id="chart" role="img" aria-label="播種からの積算温度推移グラフ">積算温度グラフ</canvas>
  </div>

  <div id="empty-msg" class="empty">データを取得するとここに一覧が表示されます。</div>
  <div id="table-wrap" class="table-card" style="display:none;">
    <table>
      <thead><tr>
        <th style="width:95px;">日付</th>
        <th style="width:55px;">播種後</th>
        <th style="width:60px;">最高℃</th>
        <th style="width:60px;">最低℃</th>
        <th style="width:60px;">有効℃</th>
        <th style="width:70px;">積算℃日</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <p class="note">
    ※ Open-Meteo（無料気象API）の村田町付近（38.13°N, 140.70°E）のデータを使用。<br>
    ※ 播種日から最大90日分を一括自動取得できます。<br>
    ※ 当日のデータは翌日以降に確定します。
  </p>
</div>

<script>
const LAT = 38.13;
const LON = 140.70;
let records = [];
let chart = null;

const today = new Date();
const fmt = d => {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};

const defaultSow = new Date(today);
defaultSow.setDate(defaultSow.getDate() - 14);
document.getElementById('sow-date').value = fmt(defaultSow);

function sowDate() { return document.getElementById('sow-date').value; }
function target() { return parseFloat(document.getElementById('target-input').value) || 1800; }
function base() { return parseFloat(document.getElementById('base-input').value) || 10; }

function daysSinceSow(dateStr) {
  const sow = new Date(sowDate());
  const d = new Date(dateStr);
  return Math.round((d - sow) / 86400000) + 1;
}

async function fetchAll() {
  const sow = sowDate();
  if (!sow) { setStatus('播種日を設定してください。', true); return; }

  const sowD = new Date(sow);
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);

  if (sowD > yesterday) {
    setStatus('播種日が今日以降になっています。昨日以前の日付を設定してください。', true);
    return;
  }

  const minDate = new Date(today);
  minDate.setDate(minDate.getDate() - 90);
  const startDate = sowD < minDate ? minDate : sowD;
  const startStr = fmt(startDate);
  const endStr = fmt(yesterday);

  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  btn.textContent = '取得中...';
  setStatus('Open-Meteoから村田町の気温データを取得中...');

  try {
    const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${LAT}&longitude=${LON}&start_date=${startStr}&end_date=${endStr}&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('APIエラー: ' + res.status);
    const data = await res.json();

    if (data.error) throw new Error(data.reason || 'データエラー');

    records = [];
    const dates = data.daily.time;
    const tmaxArr = data.daily.temperature_2m_max;
    const tminArr = data.daily.temperature_2m_min;

    for (let i = 0; i < dates.length; i++) {
      if (tmaxArr[i] !== null && tminArr[i] !== null) {
        records.push({ date: dates[i], tmax: tmaxArr[i], tmin: tminArr[i] });
      }
    }

    if (records.length === 0) {
      setStatus('データを取得できませんでした。', true);
    } else {
      const skipped = sowD < minDate ? `（90日以上前のため${startStr}から取得）` : '';
      setStatus(`完了：${records.length}日分を取得しました。${skipped}`);
    }
  } catch(e) {
    setStatus('取得に失敗しました: ' + e.message, true);
  }

  btn.disabled = false;
  btn.textContent = '気温を自動取得';
  render();
}

function setStatus(msg, isErr) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status-msg' + (isErr ? ' err' : '');
}

function render() {
  const tgt = target();
  const bs = base();
  let cumulative = 0;
  const rows = records.map(r => {
    const eff = Math.max(0, (r.tmax + r.tmin) / 2 - bs);
    cumulative += eff;
    return { ...r, eff, cumulative };
  });

  const total = rows.length > 0 ? rows[rows.length-1].cumulative : 0;
  const remain = Math.max(0, tgt - total);
  const pct = Math.min(100, Math.round(total / tgt * 100));

  document.getElementById('c-total').innerHTML = `${total.toFixed(1)} <span class="card-unit">℃日</span>`;
  document.getElementById('c-remain').innerHTML = remain > 0 ? `${remain.toFixed(1)} <span class="card-unit">℃日</span>` : `達成！`;
  document.getElementById('c-days').innerHTML = `${rows.length} <span class="card-unit">日</span>`;
  document.getElementById('c-latest').textContent = rows.length > 0 ? rows[rows.length-1].date : '—';

  document.getElementById('prog-label').textContent = `進捗 ${total.toFixed(0)} / ${tgt} ℃日`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  const fill = document.getElementById('bar-fill');
  fill.style.width = pct + '%';
  fill.className = 'bar-fill' + (pct >= 100 ? ' done' : '');

  const alertBox = document.getElementById('alert-box');
  if (pct >= 100) {
    alertBox.className = 'alert done';
    alertBox.textContent = '収穫目標の積算温度に達しました！収穫のタイミングです。';
  } else if (pct >= 80) {
    alertBox.className = 'alert near';
    alertBox.textContent = `目標まであと ${remain.toFixed(0)} ℃日。収穫時期が近づいています！`;
  } else {
    alertBox.className = 'alert';
    alertBox.textContent = '';
  }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.slice().reverse().forEach(r => {
    const dNum = daysSinceSow(r.date);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.date}</td><td>${dNum > 0 ? dNum+'日目' : '—'}</td><td>${r.tmax.toFixed(1)}</td><td>${r.tmin.toFixed(1)}</td><td>${r.eff.toFixed(1)}</td><td>${r.cumulative.toFixed(1)}</td>`;
    tbody.appendChild(tr);
  });

  document.getElementById('empty-msg').style.display = rows.length === 0 ? '' : 'none';
  document.getElementById('table-wrap').style.display = rows.length === 0 ? 'none' : '';

  if (chart) { chart.destroy(); chart = null; }
  if (rows.length > 0) {
    const ctx = document.getElementById('chart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: rows.map(r => r.date),
        datasets: [
          {
            label: '積算温度',
            data: rows.map(r => parseFloat(r.cumulative.toFixed(1))),
            borderColor: '#639922',
            backgroundColor: 'rgba(99,153,34,0.10)',
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: '#639922'
          },
          {
            label: `目標 ${tgt}℃日`,
            data: rows.map(() => tgt),
            borderColor: '#D85A30',
            borderDash: [5, 4],
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { size: 11 }, maxRotation: 45, autoSkip: true } },
          y: { beginAtZero: true, ticks: { font: { size: 11 } }, title: { display: true, text: '℃日', font: { size: 11 } } }
        }
      }
    });
  }
}

render();
</script>
</body>
</html>
